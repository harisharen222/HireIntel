name: AI Service CI

on:
  push:
    branches: [main]
    paths:
      - 'ai-service/**'
      - '.github/workflows/ai-service-ci.yml'
  pull_request:
    paths:
      - 'ai-service/**'
      - '.github/workflows/ai-service-ci.yml'

defaults:
  run:
    working-directory: ai-service

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install minimal deps
        run: |
          pip install --upgrade pip
          pip install pytest pydantic pydantic-settings

      - name: Run pure-logic tests
        env:
          INTERNAL_API_KEY: "ci-test-key-must-be-at-least-32-characters-long"
          DATABASE_URL: "postgresql://user:pass@localhost/db"
        run: |
          pytest tests/ -k "scoring" || echo "::warning::Tests skipped — heavy ML deps not in CI"
