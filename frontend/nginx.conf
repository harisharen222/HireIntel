server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Tightened security headers for the static frontend.
    # The backend sends its own headers for API responses.
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Static assets — long-term cache, they're fingerprinted by Vite.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Proxy API calls to the backend. Keep the /api prefix intact.
    location /api/ {
        proxy_pass http://backend:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Cookies — critical for HttpOnly auth to work end-to-end.
        proxy_pass_request_headers on;
        proxy_pass_header Set-Cookie;

        # File uploads can be slow; give them room.
        proxy_read_timeout 60s;
        client_max_body_size 10m;
    }

    # SPA fallback — let React Router handle unknown paths.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Don't serve hidden files.
    location ~ /\.(?!well-known) {
        deny all;
    }
}
